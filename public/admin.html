<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#E8DCC0" />
  <meta name="robots" content="noindex,nofollow" />
  <title>큐레이터 · Haeryong Dinosaur Era</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Special+Elite&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="/css/admin.css" />
</head>
<body>
  <div class="paper-grain" aria-hidden="true"></div>

  <!-- Login -->
  <section class="login" id="loginScreen">
    <div class="login__panel">
      <div class="login__seal">
        <svg viewBox="0 0 100 100" width="64" height="64" fill="currentColor">
          <circle cx="50" cy="50" r="48" fill="none" stroke="currentColor" stroke-width="1.5"/>
          <text x="50" y="44" text-anchor="middle" font-family="Cormorant Garamond" font-size="9" font-style="italic">Curator</text>
          <text x="50" y="60" text-anchor="middle" font-family="Special Elite" font-size="7">AUTHORIZED</text>
        </svg>
      </div>
      <h1>큐레이터 인증</h1>
      <p>관리자 비밀번호를 입력해주세요.</p>
      <input type="password" id="adminPw" placeholder="••••••••" autocomplete="off" />
      <div class="login__error" id="loginError"></div>
      <button id="loginBtn" class="btn btn--primary">입장</button>
    </div>
  </section>

  <!-- Dashboard -->
  <main class="admin" id="adminScreen" hidden>
    <header class="admin__head">
      <div class="admin__brand">
        <span class="admin__logo" aria-hidden="true">
          <svg viewBox="0 0 40 40" width="24" height="24" fill="currentColor"><path d="M5 28 C 5 24, 8 22, 11 22 L 14 22 C 14 18, 16 15, 19 14 L 19 11 C 19 9, 20 8, 21 8 C 22 8, 23 9, 23 11 L 23 13 C 26 13, 29 14, 31 17 L 33 17 C 35 17, 36 18, 36 20 L 33 20 C 33 23, 31 25, 28 26 L 28 31 L 25 31 L 25 27 L 17 27 L 17 31 L 14 31 L 14 27 L 11 27 C 9 27, 7 28, 6 30 Z"/></svg>
        </span>
        <span class="admin__title">
          <em>Curator</em>
          <span>Specimen Catalog</span>
        </span>
      </div>
      <div class="admin__actions">
        <button class="btn btn--primary" id="addBtn" type="button">+ 표본 등록</button>
        <a class="btn btn--ghost" href="/" target="_blank">갤러리 보기 →</a>
      </div>
    </header>

    <div class="admin__count" id="adminCount"></div>

    <div class="grid" id="grid"></div>

    <div class="admin__empty" id="adminEmpty" hidden>
      <p>등록된 표본이 없습니다.</p>
      <p class="muted">우상단 [+ 표본 등록]에서 시작하세요.</p>
    </div>
  </main>

  <!-- Edit / Create modal -->
  <div class="modal" id="formModal" aria-hidden="true">
    <div class="modal__backdrop" data-close></div>
    <div class="modal__panel">
      <div class="modal__head">
        <h3 id="formTitle">표본 등록</h3>
        <button class="iconbtn" data-close aria-label="닫기" type="button">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>

      <label class="picker" id="picker">
        <input type="file" id="imageInput" accept="image/*" hidden />
        <div class="picker__placeholder" id="pickerPlaceholder">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
          <strong>사진 첨부</strong>
          <span>탭하여 선택</span>
        </div>
        <img id="preview" class="picker__preview" alt="" />
      </label>

      <label class="field">
        <span>별명 <em>Species</em></span>
        <input type="text" id="nickname" maxlength="60" placeholder="예: 자는해룡, 우는해룡" />
      </label>

      <label class="field">
        <span>설명 <em>Field Notes</em></span>
        <textarea id="description" rows="5" maxlength="1500" placeholder="이 표본에 대한 기록..."></textarea>
      </label>

      <label class="field">
        <span>날짜 <em>Captured</em></span>
        <input type="text" id="capturedAt" maxlength="40" placeholder="예: 2025-06-12 또는 첫 데이트" />
      </label>

      <div class="modal__error" id="formError"></div>

      <div class="modal__actions">
        <button class="btn btn--ghost" data-close type="button">취소</button>
        <button class="btn btn--primary" id="saveBtn" type="button">저장</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="/js/admin.js"></script>
</body>
</html>
