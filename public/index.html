<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1" />
  <meta name="theme-color" content="#E8DCC0" />
  <title>해룡 공룡시대 · Haeryong Dinosaur Era</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Special+Elite&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="/css/main.css" />
</head>
<body>
  <!-- Paper texture overlay -->
  <div class="paper-grain" aria-hidden="true"></div>
  <div class="paper-vignette" aria-hidden="true"></div>

  <!-- Header / curatorial label -->
  <header class="topbar">
    <div class="topbar__brand">
      <span class="brand-mark" aria-hidden="true">
        <!-- Stylized dino silhouette -->
        <svg viewBox="0 0 40 40" width="32" height="32" fill="currentColor">
          <path d="M5 28 C 5 24, 8 22, 11 22 L 14 22 C 14 18, 16 15, 19 14 L 19 11 C 19 9, 20 8, 21 8 C 22 8, 23 9, 23 11 L 23 13 C 26 13, 29 14, 31 17 L 33 17 C 35 17, 36 18, 36 20 L 33 20 C 33 23, 31 25, 28 26 L 28 31 L 25 31 L 25 27 L 17 27 L 17 31 L 14 31 L 14 27 L 11 27 C 9 27, 7 28, 6 30 Z"/>
          <circle cx="21.5" cy="11" r="0.8" fill="#E8DCC0"/>
        </svg>
      </span>
      <span class="brand-text">
        <em>Haeryong</em>
        <span>Dinosaur Era · Est. 2025</span>
      </span>
    </div>

    <div class="topbar__right">
      <div class="topbar__count" id="topbarCount"></div>
      <button class="menubtn" id="menuBtn" aria-label="메뉴" aria-expanded="false" type="button">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
      </button>

      <div class="menu__panel" id="menuPanel" aria-hidden="true">
        <button class="menu__item" id="menuAuto" type="button">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="9"></circle>
            <polyline points="12 7 12 12 15 14"></polyline>
          </svg>
          <span>자동 넘김 <strong id="menuAutoLabel">OFF</strong></span>
        </button>

        <button class="menu__item" id="menuMusic" type="button">
          <svg class="menu__icon-off" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
            <line x1="23" y1="9" x2="17" y2="15"></line>
            <line x1="17" y1="9" x2="23" y2="15"></line>
          </svg>
          <svg class="menu__icon-on" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
          </svg>
          <span id="menuMusicLabel">BGM 켜기</span>
        </button>

        <button class="menu__item" id="menuRestart" type="button">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="1 4 1 10 7 10"></polyline>
            <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path>
          </svg>
          <span>처음부터</span>
        </button>
      </div>
    </div>
  </header>

  <!-- Intro screen (first load) -->
  <section class="intro" id="intro">
    <div class="intro__inner">
      <div class="intro__seal">
        <svg viewBox="0 0 100 100" width="80" height="80" fill="currentColor">
          <circle cx="50" cy="50" r="48" fill="none" stroke="currentColor" stroke-width="1.5"/>
          <circle cx="50" cy="50" r="42" fill="none" stroke="currentColor" stroke-width="0.5"/>
          <text x="50" y="42" text-anchor="middle" font-family="Cormorant Garamond" font-size="9" font-style="italic" font-weight="500">Field Guide</text>
          <text x="50" y="58" text-anchor="middle" font-family="Special Elite" font-size="8">SPECIMEN</text>
          <text x="50" y="72" text-anchor="middle" font-family="Cormorant Garamond" font-size="7" letter-spacing="2">EST · 2025</text>
        </svg>
      </div>
      <div class="intro__divider"></div>
      <h1 class="intro__title"><em>Haeryong</em><br/>Dinosaur Era</h1>
      <p class="intro__sub">우리의 1주년 · 별명 도감</p>
      <p class="intro__dday" id="introDday">Day —</p>
      <p class="intro__hint">사진을 보고 별명을 맞춰보세요.<br/>두 번 탭하면 설명이 펼쳐집니다.</p>
      <button class="intro__cta" id="introStart" type="button">
        <span>도감 펼치기</span>
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"></line>
          <polyline points="12 5 19 12 12 19"></polyline>
        </svg>
      </button>
    </div>
  </section>

  <!-- Stage -->
  <main class="stage" id="stage" aria-label="공룡 도감" hidden>
    <!-- Specimen plate frame -->
    <div class="plate" id="plate">
      <!-- Top label corners -->
      <div class="plate__corner plate__corner--tl"></div>
      <div class="plate__corner plate__corner--tr"></div>
      <div class="plate__corner plate__corner--bl"></div>
      <div class="plate__corner plate__corner--br"></div>

      <!-- Index label (top) -->
      <div class="plate__index">
        <span class="plate__index-label">Plate</span>
        <span class="plate__index-num" id="plateNum">—</span>
        <span class="plate__index-of">of <span id="plateTotal">—</span></span>
      </div>

      <!-- Image viewport -->
      <div class="plate__viewport" id="viewport">
        <!-- slides injected here -->
      </div>

      <!-- Caption block (revealed in 2 steps) -->
      <div class="plate__caption" id="caption">
        <!-- Stage 0: hidden prompt -->
        <div class="caption__prompt" id="capPrompt">
          <span class="caption__tap-hint">탭하여 별명 확인 →</span>
        </div>
        <!-- Stage 1: nickname revealed -->
        <div class="caption__name" id="capName" hidden>
          <span class="caption__species-label">Species</span>
          <strong class="caption__species" id="capSpecies">—</strong>
          <span class="caption__more-hint">한 번 더 탭하여 기록 보기 →</span>
        </div>
        <!-- Stage 2: full description -->
        <div class="caption__desc" id="capDesc" hidden>
          <span class="caption__species-label">Species</span>
          <strong class="caption__species" id="capSpecies2">—</strong>
          <p class="caption__body" id="capBody"></p>
          <div class="caption__meta">
            <span id="capDate"></span>
          </div>
        </div>
      </div>
    </div>

    <!-- Nav -->
    <button class="nav nav--prev" id="prevBtn" aria-label="이전">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
    </button>
    <button class="nav nav--next" id="nextBtn" aria-label="다음">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
    </button>
  </main>

  <!-- Empty state -->
  <section class="empty" id="empty" hidden>
    <div class="empty__inner">
      <p class="empty__label">— No specimens cataloged —</p>
      <p class="empty__hint">큐레이터가 첫 표본을 등록할 때까지 기다려 주세요.</p>
    </div>
  </section>

  <!-- Audio -->
  <audio id="bgm" src="/bgm.mp3" loop preload="auto"></audio>

  <script src="/js/main.js"></script>
</body>
</html>
