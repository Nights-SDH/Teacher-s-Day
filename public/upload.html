<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1" />
  <meta name="theme-color" content="#F4EFE7" />
  <title>편지 남기기 · 스승의 날</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="/css/upload.css" />
</head>
<body>
  <main class="page">
    <header class="hero">
      <div class="hero__brand">
        <img class="brand-logo" src="/logo.png" alt="LAVA Lab" />
        <span class="brand-text">
          <em>Teacher's Day</em>
          <span>스승의 날 · 우리 교수님께</span>
        </span>
      </div>
      <h1>
        함께한 순간을<br/>
        <em>편지에 담아주세요</em>
      </h1>
      <p>교수님과의 추억이 가득한 사진 한 장과 짧은 편지를 남기면 모두의 갤러리에 더해집니다. 본인과 교수님의 단독샷이 있다면 베스트에요!</p>
    </header>

    <form class="form" id="form">
      <!-- Image picker -->
      <label class="picker" id="picker">
        <input type="file" id="imageInput" accept="image/*" hidden />
        <div class="picker__placeholder" id="pickerPlaceholder">
          <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2"></rect>
            <circle cx="8.5" cy="8.5" r="1.5"></circle>
            <polyline points="21 15 16 10 5 21"></polyline>
          </svg>
          <strong>사진 첨부</strong>
          <span>탭해서 선택 · 최대 15MB</span>
        </div>
        <img id="preview" class="picker__preview" alt="" />
        <button type="button" class="picker__clear" id="clearImage" aria-label="사진 지우기" hidden>
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </label>

      <!-- Name -->
      <label class="field">
        <span>이름</span>
        <input type="text" id="author" maxlength="40" placeholder="홍길동" required />
      </label>

      <!-- Letter -->
      <label class="field">
        <span>편지</span>
        <textarea id="message" rows="7" maxlength="1500" placeholder="교수님께 전하고 싶은 말을 자유롭게 적어주세요." required></textarea>
        <small class="field__count" id="charCount">0 / 1500</small>
      </label>

      <!-- Password -->
      <label class="field">
        <span>비밀번호</span>
        <input type="password" id="password" minlength="2" maxlength="40" placeholder="나중에 수정·삭제할 때 사용" required />
        <small class="field__hint">간단한 4자리 숫자도 좋아요. 잊지 마세요.</small>
      </label>

      <div class="form__error" id="formError"></div>

      <button type="submit" class="submit" id="submitBtn">
        <span>편지 남기기</span>
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
      </button>

      <a class="link" href="/">← 갤러리로 돌아가기</a>
    </form>

    <!-- Success card -->
    <section class="success" id="success" hidden>
      <div class="success__inner">
        <div class="success__icon">
          <svg viewBox="0 0 24 24" width="34" height="34" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
        </div>
        <h2>편지가 도착했어요</h2>
        <p>소중한 마음이 갤러리에 더해졌습니다.</p>
        <div class="success__actions">
          <a class="btn btn--primary" href="/">갤러리 보기</a>
          <button class="btn btn--ghost" id="anotherBtn" type="button">한 번 더 남기기</button>
        </div>
      </div>
    </section>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="/js/upload.js"></script>
</body>
</html>
